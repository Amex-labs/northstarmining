databases:
  - name: northstarmining-db
    plan: free

services:
  - type: web
    name: northstarmining
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: TOKEN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: northstarmining-db
          property: connectionString
